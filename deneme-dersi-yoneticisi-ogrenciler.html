<!doctype html>
<html lang="tr" class="tm-admin-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Öğrenciler · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/trial-manager/styles/tm-layout-critical.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="ogrenciler" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">


    <div class="tm-page-head">
      <h1 class="tm-page-title">Öğrenciler</h1>
      <p class="tm-page-sub">Öğrenci bilgileri ücretsiz deneme dersi başvuru formundan gelir. Öğrenci detayları buradan görüntülenir.</p>
    </div>
    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar"><div class="tm-dg-toolbar-row">
        <input type="search" class="tm-dg-control tm-dg-search" id="tmStudentsSearch" placeholder="Ara…">
        <span class="tm-dg-spacer"></span>
        <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmStudentsPageSize"><option value="10">10</option><option value="20">20</option></select>
        <button type="button" class="tm-dg-action tm-dg-action--csv tm-dg-action--iconbtn" id="tmStudentsExport" data-tm-export title="CSV indir" aria-label="CSV indir"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg></button>
        <span class="tm-dg-count" id="tmStudentsCount">—</span>
      </div></header>
      <div id="tmStudentsLoading" class="td-state">Yükleniyor…</div>
      <div id="tmStudentsTableWrap" class="tm-res-table-wrap tm-mobile-table-wrap" hidden>
        <table class="tm-res-table"><thead><tr>
          <th>Öğrenci ID</th><th>Öğrenci</th><th>Sınıf</th><th>Veli</th><th>Veli ID</th><th>Veli Telefon</th><th>Veli E-posta</th><th>İşlem</th>
        </tr></thead><tbody id="tmStudentsBody"></tbody></table>
      </div>
      <div id="tmStudentsCards" class="tm-list-cards tm-mobile-cards" hidden></div>
      <div id="tmStudentsPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/tm-api.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/lib/message-templates.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-confirm-dialog.js"></script>
<script src="assets/trial-manager/components/tm-form-dialog.js"></script>
<script src="assets/trial-manager/components/tm-quick-message.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-request-drawer.js"></script>
<script src="assets/trial-manager/pages/tm-session-detail.js"></script>
<script src="assets/trial-manager/pages/tm-students.js"></script>
</body>
</html>
