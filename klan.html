<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Klan Detayları · Bilenyum</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Bilenyum — klan detayları, toplam XP ve genel sıralama." />
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="stylesheet" href="assets/inbox.css">
<link rel="stylesheet" href="assets/assessment.css">
<link rel="stylesheet" href="assets/assessment-light.css">
<link rel="stylesheet" href="assets/klan.css">
<script src="assets/auth-tab-session.js"></script>
<script src="assets/dashboard-switcher.js" defer></script>
<script src="assets/shell.js" defer></script>
<style>
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg-page);
  color: white;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}
button, a { font-family: inherit; cursor: pointer; }
a { text-decoration: none; color: inherit; }
.stage {
  position: relative; z-index: 5;
  height: calc(100vh - 88px);
  padding: 16px 28px;
  display: grid;
  grid-template-columns: 92px minmax(0, 1fr);
  gap: 16px;
  overflow: hidden;
}
.stage-nav { display: flex; flex-direction: column; min-height: 0; grid-column: 1; }
@media (max-width: 900px) {
  .stage { grid-template-columns: 1fr; padding: 12px 16px; }
  .stage-nav { display: none; }
}
</style>
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/dashboard-polish.css">
</head>
<body>

<div class="scene" aria-hidden="true">
  <div class="scene-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div id="stars"></div>
</div>

<header class="hud">
  <a class="hud-brand" href="index.html" aria-label="Bilenyum anasayfa">
    <img src="assets/bilenyum-logo.svg" alt="Bilenyum" />
  </a>
  <div class="hud-stats">
    <div class="stat-pill xp" title="Toplam XP">
      <span class="stat-icon">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M215.79,118.17a8,8,0,0,0-5-5.66L153.18,90.9l14.66-73.33a8,8,0,0,0-13.69-7l-112,120a8,8,0,0,0,3,13l57.63,21.61L88.16,238.43a8,8,0,0,0,13.69,7l112-120A8,8,0,0,0,215.79,118.17Z"/></svg>
      </span>
      <span class="stat-value">12.450</span>
    </div>
    <button type="button" class="stat-icon-btn is-msg" id="msgBtn" aria-label="Mesajlarım" data-inbox-open="msg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="notif-dot"></span>
    </button>
    <button type="button" class="stat-icon-btn is-notif" id="notifBtn" aria-label="Bildirimler" data-inbox-open="notif">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </button>
    <div class="hud-profile">
      <button type="button" class="hud-player" id="profileBtn" aria-haspopup="true" aria-expanded="false">
        <span class="player-avatar-wrap" style="--xp-pct: 64%;">
          <span class="player-avatar-ring"></span>
          <span class="player-avatar"><span aria-hidden="true">🧒</span></span>
        </span>
        <span class="player-text">
          <span class="player-name">Mira Yılmaz</span>
          <span class="player-clan">Alfa Klanı</span>
        </span>
        <svg class="hud-player-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="hud-menu" id="profileMenu" role="menu">
        <button type="button" class="hud-menu-item" role="menuitem">Profilim</button>
        <button type="button" class="hud-menu-item" role="menuitem">Ayarlar</button>
        <div class="hud-menu-divider"></div>
        <button type="button" class="hud-menu-item is-danger" role="menuitem">Çıkış Yap</button>
      </div>
    </div>
  </div>
</header>

<main class="stage">
  <div class="stage-nav">
    <aside class="nav-rail" aria-label="Ana menü">
      <a class="nav-item is-active" href="dashboard.html" title="Merkez" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-item-label">Merkez</span>
      </a>
      <a class="nav-item" href="program.html" title="Program">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nav-item-label">Program</span>
      </a>
      <a class="nav-item" href="odevler.html" title="Ödevler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="nav-item-label">Ödevler</span>
      </a>
      <a class="nav-item" href="tekrarlar.html" title="Ders Tekrarları">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span class="nav-item-label">Ders Tekrarları</span>
      </a>
      <a class="nav-item" href="sinavlar.html" title="Sonuçlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 14 11 16 15 12"/></svg>
        <span class="nav-item-label">Sonuçlar</span>
      </a>
      <a class="nav-item" href="performans.html" title="Performans">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-item-label">Performans</span>
      </a>
    </aside>
  </div>

  <section class="klan-page" aria-labelledby="klanPageTitle">
    <header class="klan-pagehead">
      <h1 class="klan-pagehead-title" id="klanPageTitle">Klan Detayları</h1>
      <span class="klan-pagehead-line" aria-hidden="true"></span>
    </header>

    <article class="klan-detail-card" id="klanDetailCard" data-clan="alfa">
      <div class="klan-detail-visual">
        <div class="klan-detail-emblem" id="klanEmblem" aria-hidden="true">⚡</div>
      </div>
      <div class="klan-detail-body">
        <span class="klan-detail-eyebrow">Klanın</span>
        <h2 class="klan-detail-name" id="klanName">Alfa Klanı</h2>
        <div class="klan-detail-stats">
          <div class="klan-stat">
            <span class="klan-stat-label">Toplam XP</span>
            <span class="klan-stat-val" id="klanTotalXp">184.250</span>
          </div>
          <div class="klan-stat">
            <span class="klan-stat-label">Genel Sıralama</span>
            <span class="klan-stat-val is-rank" id="klanRank">#2</span>
          </div>
          <div class="klan-stat">
            <span class="klan-stat-label">Program Türü</span>
            <span class="klan-stat-val is-program" id="klanProgramType">Hafta İçi Erken</span>
          </div>
        </div>
      </div>
    </article>

    <section class="klan-rankings" aria-labelledby="klanRankingsTitle">
      <header class="klan-section-head">
        <h2 class="klan-section-title" id="klanRankingsTitle">Klan ve Bireysel Sıralama</h2>
        <span class="klan-section-line" aria-hidden="true"></span>
      </header>
      <div class="klan-rankings-grid">
        <div class="klan-rank-panel klan-rank-panel--clan">
          <header class="klan-rank-panel-head">
            <span class="klan-rank-panel-icon" aria-hidden="true">🏆</span>
            <h3 class="klan-rank-panel-title">Klan Genel Sıralaması</h3>
            <span class="klan-rank-panel-line" aria-hidden="true"></span>
          </header>
          <div class="klan-rank-list" id="klanRankList" role="list"></div>
        </div>
        <div class="klan-rank-panel klan-rank-panel--student">
          <header class="klan-rank-panel-head">
            <span class="klan-rank-panel-icon" aria-hidden="true">🪐</span>
            <h3 class="klan-rank-panel-title">Öğrenci Bireysel Sıralaması</h3>
            <span class="klan-rank-panel-line" aria-hidden="true"></span>
          </header>
          <div class="klan-rank-list" id="studentRankList" role="list"></div>
        </div>
      </div>
    </section>
  </section>
</main>

<script src="assets/assessment.js"></script>
<script src="assets/klan.js"></script>
<script src="assets/inbox.js"></script>
</body>
</html>
