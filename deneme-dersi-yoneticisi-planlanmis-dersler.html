<!doctype html>
<html lang="tr" class="tm-admin-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Deneme Dersleri · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/trial-manager/styles/tm-layout-critical.css">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="deneme-dersleri" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>

  <main class="tm-admin-main">
    <div class="tm-page-head">
      <h1 class="tm-page-title">Deneme Dersleri</h1>
      <p class="tm-page-sub">Online deneme dersi oturumları — kapasite, link, öğretmen ve katılımcı yönetimi.</p>
    </div>

    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar">
        <div class="tm-dg-toolbar-row">
          <input type="search" class="tm-dg-control tm-dg-search" id="tmSessionsSearch" placeholder="Ara: ders, öğretmen, ID…">
          <select class="tm-dg-control tm-dg-select" id="tmSessionsType">
            <option value="all">Tüm ders türleri</option>
            <option value="lt-mat">Matematik</option>
            <option value="lt-fen">Fen</option>
          </select>
          <select class="tm-dg-control tm-dg-select" id="tmSessionsStatus">
            <option value="all">Tüm durumlar</option>
            <option value="confirmed">Onaylandı</option>
            <option value="cancelled">İptal Edildi</option>
            <option value="completed">Tamamlandı</option>
          </select>
          <select class="tm-dg-control tm-dg-select" id="tmSessionsPdrTeacher">
            <option value="all">Tüm PDR öğretmenleri</option>
          </select>
          <select class="tm-dg-control tm-dg-select" id="tmSessionsBranchTeacher">
            <option value="all">Tüm branş öğretmenleri</option>
          </select>
          <span class="tm-dg-spacer"></span>
          <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmSessionsPageSize">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
          <button type="button" class="tm-dg-action tm-dg-action--csv tm-dg-action--iconbtn" id="tmSessionsExport" data-tm-export title="CSV indir" aria-label="CSV indir"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg></button>
          <a class="tm-dg-action tm-dg-action--create tm-dg-action--iconbtn" id="tmSessionsCreate" href="deneme-dersi-yoneticisi-ders-planla.html" title="Yeni ders oluştur" aria-label="Yeni ders oluştur"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg></a>
          <span class="tm-dg-count" id="tmSessionsCount">—</span>
        </div>
      </header>

      <p id="tmSessionsFilterHint" class="tm-alert-row" style="margin:0 16px 12px" hidden></p>

      <div id="tmSessionsLoading" class="td-state">Yükleniyor…</div>
      <div id="tmSessionsTableWrap" class="tm-res-table-wrap tm-sessions-table-wrap tm-mobile-table-wrap" hidden>
        <table class="tm-res-table tm-res-table--rich">
          <thead>
            <tr>
              <th>Deneme Dersi ID</th><th>Meeting ID</th><th>Tarih</th><th>Saat</th><th>Ders türü</th><th>Sınıf</th><th>PDR öğretmeni</th><th>Branş öğretmeni</th>
              <th>Kapasite</th><th>Dolu</th><th>Boş</th><th>Durum</th><th>İşlem</th>
            </tr>
          </thead>
          <tbody id="tmSessionsBody"></tbody>
        </table>
      </div>
      <div id="tmSessionsCards" class="tm-list-cards tm-sessions-cards tm-mobile-cards" hidden></div>
      <div id="tmSessionsPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>

<script src="assets/trial-manager/lib/types.js"></script>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/tm-api.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/lib/message-templates.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-confirm-dialog.js"></script>
<script src="assets/trial-manager/components/tm-form-dialog.js"></script>
<script src="assets/trial-manager/components/tm-quick-message.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-session-detail.js"></script>
<script src="assets/trial-manager/pages/tm-sessions.js"></script>
</body>
</html>
