<!doctype html>
<html lang="tr" class="tm-admin-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Online Ders Linkleri · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/trial-manager/styles/tm-layout-critical.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="online-linkler" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">


    <div class="tm-page-head"><h1 class="tm-page-title">Online Ders Linkleri</h1><p class="tm-page-sub">Meeting ID, şifre, link durumu ve gönderim takibi.</p></div>
    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar"><div class="tm-dg-toolbar-row">
        <input type="search" class="tm-dg-control tm-dg-search" id="tmMeetingsSearch" placeholder="Ara…">
        <select class="tm-dg-control tm-dg-select" id="tmMeetingsStatus">
          <option value="all">Tümü</option><option value="active">Aktif</option><option value="cancelled">İptal</option><option value="not_sent">Link gönderilmeyen</option>
        </select>
        <span class="tm-dg-spacer"></span>
        <button type="button" class="tm-dg-action" id="tmMeetingsBulkLinks" data-tm-require="edit" style="border:none;cursor:pointer;margin-right:8px">Tüm onaylı linkleri işaretle</button>
        <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmMeetingsPageSize"><option value="10">10</option></select>
        <button type="button" class="tm-dg-action" id="tmMeetingsExport" data-tm-export style="border:none;cursor:pointer">CSV</button>
        <span class="tm-dg-count" id="tmMeetingsCount">—</span>
      </div></header>
      <div id="tmMeetingsLoading" class="td-state">Yükleniyor…</div>
      <div id="tmMeetingsTableWrap" class="tm-res-table-wrap tm-mobile-table-wrap" hidden>
        <table class="tm-res-table"><thead><tr>
          <th>Tarih</th><th>Saat</th><th>Ders</th><th>PDR öğretmeni</th><th>Branş öğretmeni</th><th>Meeting ID</th><th>Şifre</th><th>Link</th><th>Gönderilen</th><th>Gönderilmeyen</th><th>Ders durumu</th><th></th>
        </tr></thead><tbody id="tmMeetingsBody"></tbody></table>
      </div>
      <div id="tmMeetingsCards" class="tm-list-cards tm-mobile-cards" hidden></div>
      <div id="tmMeetingsPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/tm-api.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/lib/message-templates.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-confirm-dialog.js"></script>
<script src="assets/trial-manager/components/tm-form-dialog.js"></script>
<script src="assets/trial-manager/components/tm-quick-message.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-session-detail.js"></script>
<script src="assets/trial-manager/pages/tm-meetings.js"></script>
</body>
</html>
