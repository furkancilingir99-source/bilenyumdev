<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rezervasyonlar · Deneme Dersi Yöneticisi · Bilenyum</title>
<meta name="description" content="Bilenyum — Deneme dersi rezervasyon listesi: veli, öğrenci ve iletişim bilgileri." />
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="stylesheet" href="assets/dashboard-d3-mega.css">
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/dashboard-polish.css">
<link rel="stylesheet" href="assets/teacher-dashboard.css">
<link rel="stylesheet" href="assets/trial-lesson-manager.css">
<script src="assets/auth-tab-session.js"></script>
<script src="assets/dashboard-switcher.js" defer></script>
<script src="assets/trial-lesson-manager-shell.js" defer></script>
<script src="assets/shell.js" defer></script>
</head>
<body data-trial-manager-active="rezervasyonlar">

<div class="scene" aria-hidden="true">
  <div class="scene-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<header class="hud" data-trial-manager-hud></header>

<main class="stage thw-stage tm-stage">
  <div class="stage-nav" data-trial-manager-nav></div>

  <div class="tm-main-col">
    <div class="thw-context-panel">
      <div class="thw-page-head">
        <h1 class="thw-page-title">Rezervasyonlar</h1>
        <p class="thw-page-subtitle">Deneme dersi talep eden velilerin, öğrencilerin ve iletişim bilgilerinin listesi.</p>
      </div>
    </div>

    <div id="tmResLoading" class="td-state">
      <div class="td-skeleton"><div class="td-skeleton-bar"></div><div class="td-skeleton-bar"></div></div>
      Rezervasyonlar yükleniyor...
    </div>

    <section class="tm-panel">
      <div class="tm-toolbar tm-toolbar-filters">
        <input type="search" class="tm-search" id="tmResSearch" placeholder="Öğrenci, veli, telefon veya e-posta ara…" aria-label="Rezervasyon ara">
        <select class="tm-filter-select" id="tmResStatusFilter" aria-label="Durum filtresi">
          <option value="all">Tüm durumlar</option>
          <option value="pending">Onay bekliyor</option>
          <option value="confirmed">Onaylandı</option>
          <option value="completed">Tamamlandı</option>
          <option value="cancelled">İptal</option>
        </select>
        <select class="tm-filter-select" id="tmResGradeFilter" aria-label="Sınıf filtresi">
          <option value="all">Tüm sınıflar</option>
        </select>
        <select class="tm-filter-select" id="tmResSubjectFilter" aria-label="Ders filtresi">
          <option value="all">Tüm dersler</option>
        </select>
      </div>

      <div class="tm-toolbar tm-toolbar-meta">
        <select class="tm-filter-select" id="tmResSort" aria-label="Sıralama">
          <option value="createdAt-desc">Kayıt tarihi (en yeni)</option>
          <option value="createdAt-asc">Kayıt tarihi (en eski)</option>
          <option value="student-asc">Öğrenci adı (A→Z)</option>
          <option value="student-desc">Öğrenci adı (Z→A)</option>
          <option value="subject-asc">Ders (A→Z)</option>
        </select>
        <select class="tm-filter-select" id="tmResPageSize" aria-label="Sayfa başına kayıt">
          <option value="5">5 / sayfa</option>
          <option value="8" selected>8 / sayfa</option>
          <option value="10">10 / sayfa</option>
          <option value="20">20 / sayfa</option>
        </select>
        <span class="tm-panel-link" id="tmResCount" aria-live="polite">—</span>
      </div>

      <p id="tmResEmpty" class="td-state" hidden>Eşleşen rezervasyon bulunamadı.</p>

      <div id="tmResTableWrap" class="tm-res-table-wrap" hidden>
        <table class="tm-res-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Öğrenci</th>
              <th>Sınıf</th>
              <th>Ders</th>
              <th>Veli</th>
              <th>Telefon</th>
              <th>E-posta</th>
              <th>Kayıt Tarihi</th>
              <th>Ders Tarihi / Saat</th>
              <th>Durum</th>
            </tr>
          </thead>
          <tbody id="tmResTableBody"></tbody>
        </table>
      </div>

      <div id="tmResPagination" class="tm-pagination" hidden></div>
    </section>
  </div>
</main>

<div class="tm-drawer" id="tmResDrawer" aria-hidden="true" role="dialog" aria-labelledby="tmResDrawerTitle" aria-modal="true">
  <div class="tm-drawer-overlay" id="tmResDrawerOverlay"></div>
  <aside class="tm-drawer-panel">
    <button type="button" class="tm-drawer-close" data-tm-drawer-close aria-label="Kapat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <header class="tm-drawer-head">
      <span class="tm-drawer-eyebrow">REZERVASYON DETAYI</span>
      <h2 class="tm-drawer-title" id="tmResDrawerTitle">—</h2>
    </header>
    <div class="tm-drawer-body" id="tmResDrawerBody"></div>
  </aside>
</div>

<script src="assets/trial-lesson-manager-mock.js"></script>
<script src="assets/trial-lesson-manager-reservations.js"></script>
</body>
</html>
