<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rezervasyon Talepleri · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/trial-lesson-manager.css">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="rezervasyon-talepleri" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">




    <div class="tm-page-head">
      <h1 class="tm-page-title">Rezervasyon Talepleri</h1>
      <p class="tm-page-sub">Web sitesinden gelen ücretsiz online deneme dersi form talepleri.</p>
    </div>

    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar">
        <div class="tm-dg-toolbar-row">
          <input type="search" class="tm-dg-control tm-dg-search" id="tmRequestsSearch" placeholder="Ara: öğrenci, veli, telefon…">
          <select class="tm-dg-control tm-dg-select" id="tmRequestsStatus">
            <option value="all">Tüm durumlar</option>
            <option value="new">Yeni</option>
            <option value="reviewing">İnceleniyor</option>
            <option value="assigned">Atandı</option>
            <option value="rejected">Reddedildi</option>
            <option value="cancelled">İptal</option>
            <option value="orphan">Rezervasyonsuz</option>
          </select>
          <span class="tm-dg-spacer"></span>
          <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmRequestsPageSize">
            <option value="10" selected>10</option><option value="20">20</option>
          </select>
          <button type="button" class="tm-dg-action" id="tmRequestsSimulate" style="border:none;cursor:pointer">+ Talep simüle</button>
          <button type="button" class="tm-dg-action" id="tmRequestsExport" style="border:none;cursor:pointer">CSV</button>
          <span class="tm-dg-count" id="tmRequestsCount">—</span>
        </div>
      </header>
      <div id="tmRequestsLoading" class="td-state">Yükleniyor…</div>
      <div id="tmRequestsTableWrap" class="tm-res-table-wrap" hidden>
        <table class="tm-res-table tm-res-table--rich">
          <thead>
            <tr>
              <th>Talep tarihi</th><th>Öğrenci</th><th>Yaş</th><th>Sınıf</th><th>Seviye</th><th>Ders türü</th>
              <th>Veli</th><th>Telefon</th><th>E-posta</th><th>Seçilen ders</th><th>Veli onay</th><th>Durum</th><th>Link</th><th>İşlem</th>
            </tr>
          </thead>
          <tbody id="tmRequestsBody"></tbody>
        </table>
      </div>
      <div id="tmRequestsPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>

<script src="assets/trial-manager/lib/types.js"></script>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/lib/message-templates.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-requests.js"></script>
</body>
</html>
