<!doctype html>
<html lang="tr" class="tm-admin-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rezervasyon Talepleri · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/trial-manager/styles/tm-layout-critical.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="rezervasyon-talepleri" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">




    <div class="tm-page-head">
      <h1 class="tm-page-title">Rezervasyon Talepleri</h1>
      <p class="tm-page-sub">Web sitesinden gelen ücretsiz online deneme dersi form talepleri.</p>
    </div>

    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar">
        <div class="tm-dg-toolbar-row">
          <input type="search" class="tm-dg-control tm-dg-search" id="tmRequestsSearch" placeholder="Ara: öğrenci, veli, telefon…">
          <select class="tm-dg-control tm-dg-select" id="tmRequestsContact">
            <option value="all">İletişim durumu seç</option>
            <option value="positive">Olumlu</option>
            <option value="negative">Olumsuz</option>
            <option value="unreachable">Ulaşılamadı</option>
            <option value="none">Görüşülmedi</option>
          </select>
          <select class="tm-dg-control tm-dg-select" id="tmRequestsAssignment">
            <option value="all">Ders Ataması durumu</option>
            <option value="assigned">Ataması yapıldı</option>
            <option value="unassigned">Ataması yapılmadı</option>
          </select>
          <select class="tm-dg-control tm-dg-select" id="tmRequestsReservationStatus">
            <option value="all">Rezervasyon Durumu</option>
            <option value="pending">Bekliyor</option>
            <option value="approved">Onaylandı</option>
            <option value="cancelled">İptal Edildi</option>
          </select>
          <span class="tm-dg-spacer"></span>
          <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmRequestsPageSize">
            <option value="10" selected>10</option><option value="20">20</option>
          </select>
          <button type="button" class="tm-dg-action tm-dg-action--csv tm-dg-action--iconbtn" id="tmRequestsExport" data-tm-export title="CSV indir" aria-label="CSV indir"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg></button>
          <span class="tm-dg-count" id="tmRequestsCount">—</span>
        </div>
      </header>
      <div id="tmRequestsLoading" class="td-state">Yükleniyor…</div>
      <div id="tmRequestsTableWrap" class="tm-res-table-wrap tm-mobile-table-wrap" hidden>
        <table class="tm-res-table tm-res-table--rich">
          <colgroup>
            <col style="width:10%"><col style="width:10%"><col style="width:9%"><col style="width:8%"><col style="width:6%"><col style="width:10%">
            <col style="width:8%"><col style="width:5%"><col style="width:6%"><col style="width:6%"><col style="width:6%"><col style="width:5%"><col style="width:5%"><col style="width:6%">
          </colgroup>
          <thead>
            <tr>
              <th>Talep tarihi</th><th>İstediği Ders Tarihi</th><th>Rez. ID</th><th>Veli</th><th>Telefon</th><th>E-posta</th>
              <th>Öğrenci</th><th>Sınıf</th><th>Ders türü</th><th>Ders ID</th><th>İletişim Bilgisi</th><th>Ders Ataması</th><th>Durum</th><th>İşlem</th>
            </tr>
          </thead>
          <tbody id="tmRequestsBody"></tbody>
        </table>
      </div>
      <div id="tmRequestsCards" class="tm-list-cards tm-mobile-cards" hidden></div>
      <div id="tmRequestsPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>

<script src="assets/trial-manager/lib/types.js"></script>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/tm-api.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/lib/message-templates.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-confirm-dialog.js"></script>
<script src="assets/trial-manager/components/tm-form-dialog.js"></script>
<script src="assets/trial-manager/components/tm-quick-message.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-request-drawer.js"></script>
<script src="assets/trial-manager/pages/tm-simulate-request.js"></script>
<script src="assets/trial-manager/pages/tm-requests.js"></script>
</body>
</html>
