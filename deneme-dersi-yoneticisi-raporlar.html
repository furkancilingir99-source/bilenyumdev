<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Raporlar · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/trial-lesson-manager.css">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="raporlar" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">

    <div class="tm-page-head">
      <h1 class="tm-page-title">Raporlar</h1>
      <p class="tm-page-sub">Katılım, dönüşüm, talep dağılımı, öğretmen performansı ve iletişim metrikleri.</p>
    </div>

    <section class="tm-panel tm-report-panel">
      <div class="tm-report-toolbar">
        <label>Başlangıç <input type="date" class="tm-dg-control" id="tmReportStart"></label>
        <label>Bitiş <input type="date" class="tm-dg-control" id="tmReportEnd"></label>
        <span class="tm-dg-spacer"></span>
        <button type="button" class="tm-btn tm-btn--ghost" id="tmReportExportCsv" data-tm-export>Özet CSV</button>
        <button type="button" class="tm-btn tm-btn--ghost" id="tmReportExportTabCsv" data-tm-export hidden>Sekme CSV</button>
        <button type="button" class="tm-btn tm-btn--primary" id="tmReportExportXls" data-tm-export>Excel paketi (.xls)</button>
      </div>
      <div class="tm-comm-tabs" id="tmReportTabs"></div>
      <div id="tmReportGrid" class="tm-report-grid"></div>
      <div id="tmReportTable" class="tm-report-table-wrap" hidden></div>
    </section>
  </main>
</div>

<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/tm-api.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-audit-actions.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-request-drawer.js"></script>
<script src="assets/trial-manager/pages/tm-session-detail.js"></script>
<script src="assets/trial-manager/pages/tm-reports.js"></script>
</body>
</html>
