<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ders Planla · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/trial-lesson-manager.css">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="deneme-dersleri" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">

    <div class="tm-page-head">
      <h1 class="tm-page-title" id="tmPlanTitle">Yeni Online Deneme Dersi Planla</h1>
      <p class="tm-page-sub" id="tmPlanSub">Matematik veya Fen · Saat başı 50 dakika · Kapasite 20 · Otomatik meeting linki oluşturulur.</p>
    </div>

    <div class="tm-plan-layout">
      <section class="tm-panel tm-plan-slots-panel">
        <h2 class="tm-panel-title">Slot önizleme</h2>
        <div id="tmPlanSlots"></div>
      </section>

      <section class="tm-panel tm-plan-form-panel" style="padding:20px">
        <h2 class="tm-panel-title">Ders bilgileri</h2>
        <div id="tmPlanConflict" class="tm-alert-row" hidden></div>
        <form id="tmPlanForm" onsubmit="return false">
          <div class="tm-plan-fields">
            <label>Ders türü
              <select class="tm-dg-control" id="tmPlanType"></select>
            </label>
            <label>Tarih
              <input type="date" class="tm-dg-control" id="tmPlanDate">
            </label>
            <label>Saat slotu
              <select class="tm-dg-control" id="tmPlanTime"></select>
            </label>
            <label>Öğretmen
              <select class="tm-dg-control" id="tmPlanTeacher"></select>
            </label>
            <label>Not
              <textarea class="tm-dg-control" id="tmPlanNotes" rows="2"></textarea>
            </label>
          </div>
          <div class="tm-plan-actions">
            <button type="button" class="tm-btn tm-btn--primary" id="tmPlanSave">Kaydet</button>
            <a class="tm-btn tm-btn--ghost" href="deneme-dersi-yoneticisi-planlanmis-dersler.html">İptal</a>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>

<script src="assets/trial-manager/lib/types.js"></script>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-confirm-dialog.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-planner.js"></script>
</body>
</html>
