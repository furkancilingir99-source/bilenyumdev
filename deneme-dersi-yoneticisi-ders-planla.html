<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ders Planla · Deneme Dersi Yöneticisi · Bilenyum</title>
<meta name="description" content="Deneme dersi planlama — branş, sınıf, öğretmen ve öğrenci yönetimi." />
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="stylesheet" href="assets/dashboard-d3-mega.css">
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/dashboard-polish.css">
<link rel="stylesheet" href="assets/teacher-dashboard.css">
<link rel="stylesheet" href="assets/trial-lesson-manager.css">
<script src="assets/auth-tab-session.js"></script>
<script src="assets/dashboard-switcher.js" defer></script>
<script src="assets/trial-lesson-manager-shell.js" defer></script>
<script src="assets/shell.js" defer></script>
</head>
<body data-trial-manager-active="ders-planla">

<div class="scene" aria-hidden="true">
  <div class="scene-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<header class="hud" data-trial-manager-hud></header>

<main class="stage thw-stage tm-stage">
  <div class="stage-nav" data-trial-manager-nav></div>

  <div class="tm-main-col">
    <div class="thw-context-panel">
      <div class="thw-page-head">
        <h1 class="thw-page-title">Ders Planla</h1>
        <p class="thw-page-subtitle">Branş, sınıf ve öğretmen seçerek deneme dersi oluşturun; öğrencileri mevcut başvurular arasından seçin, veli ve öğretmen ile koordinasyon kurun.</p>
      </div>
    </div>

    <section class="tm-panel tm-planner-editor-wrap" id="tmPlannerEditor" aria-label="Ders planlama formu"></section>
  </div>
</main>

<div class="tm-planner-toast" id="tmPlannerToast" role="status" aria-live="polite" hidden></div>

<div class="tm-modal" id="tmModal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="tm-modal-overlay" data-tm-modal-close></div>
  <div class="tm-modal-panel tm-modal-panel--wide">
    <button type="button" class="tm-modal-close" data-tm-modal-close aria-label="Kapat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <header class="tm-modal-head">
      <span class="tm-modal-eyebrow">BAŞVURULAR</span>
      <h2 class="tm-modal-title" data-tm-modal-title>Öğrenci seçimi</h2>
      <p class="tm-modal-sub" data-tm-modal-sub hidden></p>
    </header>
    <div class="tm-modal-body" data-tm-modal-body></div>
    <footer class="tm-modal-foot" data-tm-modal-foot></footer>
  </div>
</div>

<script src="assets/trial-lesson-manager-mock.js"></script>
<script src="assets/trial-lesson-planner-mock.js"></script>
<script src="assets/trial-lesson-manager-modal.js"></script>
<script src="assets/trial-lesson-applicant-picker.js"></script>
<script src="assets/trial-lesson-planner.js"></script>
</body>
</html>
