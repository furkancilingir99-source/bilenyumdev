<!doctype html>
<html lang="tr" class="tm-admin-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>İletişim Takibi · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/trial-manager/styles/tm-layout-critical.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="iletisim" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">


    <div class="tm-page-head"><h1 class="tm-page-title">İletişim Takibi</h1><p class="tm-page-sub">Aranacak veliler, onay bekleyenler, link gönderilecekler ve iletişim geçmişi.</p></div>
    <section class="tm-panel tm-panel--datagrid">
      <div class="tm-comm-tabs" id="tmCommTabs"></div>
      <header class="tm-dg-toolbar" style="border-top:1px solid #e2e8f0">
        <div class="tm-dg-toolbar-row">
          <span class="tm-dg-spacer"></span>
          <button type="button" class="tm-dg-action" id="tmCommBulkLinks" data-tm-require="edit" hidden style="border:none;cursor:pointer;margin-right:8px">Tüm linkleri işaretle</button>
          <button type="button" class="tm-dg-action" id="tmCommExport" data-tm-export style="border:none;cursor:pointer;margin-right:8px">CSV</button>
          <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmCommPageSize">
            <option value="15" selected>15</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>
        </div>
      </header>
      <div id="tmCommLoading" class="td-state">Yükleniyor…</div>
      <div id="tmCommTableWrap" class="tm-res-table-wrap tm-mobile-table-wrap" hidden>
        <table class="tm-res-table"><thead><tr>
          <th>Kişi</th><th>Rol</th><th>Öğrenci</th><th>Ders</th><th>PDR öğretmeni</th><th>Branş öğretmeni</th><th>Telefon</th><th>Kanal</th><th>Sonuç</th><th>Son iletişim</th><th>Sonraki aksiyon</th><th>Sorumlu</th><th></th>
        </tr></thead><tbody id="tmCommBody"></tbody></table>
      </div>
      <div id="tmCommCards" class="tm-list-cards tm-mobile-cards" hidden></div>
      <div id="tmCommPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>
<script src="assets/trial-manager/lib/status-labels.js"></script>
<script src="assets/trial-manager/lib/audit-utils.js"></script>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/tm-api.js"></script>
<script src="assets/trial-manager/lib/scheduling-rules.js"></script>
<script src="assets/trial-manager/lib/message-templates.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-form-dialog.js"></script>
<script src="assets/trial-manager/components/tm-quick-message.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-request-drawer.js"></script>
<script src="assets/trial-manager/pages/tm-session-detail.js"></script>
<script src="assets/trial-manager/pages/tm-communication.js"></script>
</body>
</html>
