<!doctype html>
<html lang="tr" class="tm-admin-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kullanıcılar ve Yetkiler · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/trial-manager/styles/tm-layout-critical.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body data-tm-page="kullanicilar" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">


    <div class="tm-page-head"><h1 class="tm-page-title">Kullanıcılar ve Yetkiler</h1><p class="tm-page-sub">Yönetici görüntüleme, düzenleme, iptal ve dışa aktarma izinleri.</p></div>
    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar"><div class="tm-dg-toolbar-row">
        <span class="tm-dg-spacer"></span>
        <button type="button" class="tm-dg-action" id="tmUsersExport" data-tm-export style="border:none;cursor:pointer">CSV</button>
      </div></header>
      <div id="tmUsersLoading" class="td-state">Yükleniyor…</div>
      <div id="tmUsersTableWrap" class="tm-res-table-wrap tm-mobile-table-wrap" hidden>
        <table class="tm-res-table"><thead><tr>
          <th>Ad</th><th>E-posta</th><th>Rol</th><th>Görüntüle</th><th>Oluştur</th><th>Düzenle</th><th>İptal</th><th>Dışa aktar</th><th>Durum</th><th></th>
        </tr></thead><tbody id="tmUsersBody"></tbody></table>
      </div>
      <div id="tmUsersCards" class="tm-list-cards tm-mobile-cards" hidden></div>
    </section>
  </main>
</div>
<script src="assets/trial-manager/lib/status-labels.js"></script>

<script src="assets/trial-manager/components/tm-toast.js"></script>
<script src="assets/trial-manager/components/tm-permissions.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-users.js"></script>
</body>
</html>
