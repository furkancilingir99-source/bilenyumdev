[build]
  publish = "."

[[redirects]]
  from = "/login"
  to = "/giris"
  status = 302

[[redirects]]
  from = "/login.html"
  to = "/giris"
  status = 302

[[redirects]]
  from = "/dashboard"
  to = "/ogrenci-dashboard"
  status = 301

[[redirects]]
  from = "/dashboard.html"
  to = "/ogrenci-dashboard"
  status = 301

[[redirects]]
  from = "/sinav-sonuclari"
  to = "/sinav-sonuclari.html"
  status = 200

[[redirects]]
  from = "/seviye-belirleme"
  to = "/seviye-belirleme.html"
  status = 200

[[redirects]]
  from = "/ogrenci-dashboard"
  to = "/ogrenci-dashboard.html"
  status = 200

[[redirects]]
  from = "/giris"
  to = "/giris.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Download-Options = "noopen"
