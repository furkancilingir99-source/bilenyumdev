<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Öğretmenler · Deneme Dersi Yöneticisi · Bilenyum</title>
<link rel="icon" type="image/svg+xml" href="assets/bilenyum-app-icon.svg">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dashboard-light.css">
<link rel="stylesheet" href="assets/trial-lesson-manager.css">
<link rel="stylesheet" href="assets/trial-manager/styles/trial-manager-admin.css">
<script src="assets/auth-tab-session.js"></script>
</head>
<body data-tm-page="ogretmenler" class="tm-admin-body">

<div id="tmHudMount" data-trial-manager-hud></div>

<div class="tm-admin-layout">
  <aside id="tmSidebarMount" class="tm-sidebar" aria-label="Deneme dersi yönetim menüsü"></aside>
  <main class="tm-admin-main">


    <div class="tm-page-head"><h1 class="tm-page-title">Öğretmenler</h1><p class="tm-page-sub">Branş, müsaitlik, ders yükü ve dashboard durumu.</p></div>
    <section class="tm-panel tm-panel--datagrid">
      <header class="tm-dg-toolbar"><div class="tm-dg-toolbar-row">
        <input type="search" class="tm-dg-control tm-dg-search" id="tmTeachersSearch" placeholder="Ara…">
        <span class="tm-dg-spacer"></span>
        <select class="tm-dg-control tm-dg-select tm-dg-select--narrow" id="tmTeachersPageSize"><option value="10">10</option></select>
        <button type="button" class="tm-dg-action" id="tmTeachersExport" style="border:none;cursor:pointer">CSV</button>
        <span class="tm-dg-count" id="tmTeachersCount">—</span>
      </div></header>
      <div id="tmTeachersLoading" class="td-state">Yükleniyor…</div>
      <div id="tmTeachersTableWrap" class="tm-res-table-wrap" hidden>
        <table class="tm-res-table"><thead><tr>
          <th>Öğretmen</th><th>Branş</th><th>Telefon</th><th>E-posta</th><th>Bugün</th><th>Bu hafta</th><th>Müsaitlik</th><th>Dashboard</th><th></th>
        </tr></thead><tbody id="tmTeachersBody"></tbody></table>
      </div>
      <div id="tmTeachersPagination" class="tm-pagination" hidden></div>
    </section>
  </main>
</div>
<script src="assets/trial-manager/lib/mock-data.js"></script>
<script src="assets/trial-manager/lib/export-utils.js"></script>
<script src="assets/trial-manager/components/tm-utils.js"></script>
<script src="assets/trial-manager/components/tm-detail-drawer.js"></script>
<script src="assets/trial-manager/components/tm-app-shell.js"></script>
<script src="assets/trial-manager/components/tm-page-boot.js"></script>
<script src="assets/trial-manager/pages/tm-teachers.js"></script>
</body>
</html>
